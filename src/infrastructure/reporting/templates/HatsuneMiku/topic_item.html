{% if topics %}
<div style="margin-bottom: 40px;">
    <div class="section-header">
        <div class="v-bar"></div>
        <div class="section-title-text">今日话题</div>
    </div>
    {% for topic in topics %}
    <div class="card-common" style="padding: 20px; border-left: 5px solid var(--miku-base); display: flex; gap: 15px;">
        <div style="font-family: var(--font-num); font-size: 1.5rem; color: var(--miku-pink-light); font-weight: bold; padding-top: 2px;">
            #{{ "%02d"|format(topic.index) }}
        </div>
        <div style="flex: 1;">
            <div style="font-weight: bold; font-size: 1.15rem; color: var(--accent-dark); margin-bottom: 8px;">{{ topic.topic.topic }}</div>
            <div style="line-height: 1.8; color: var(--text-main); font-size: 0.95rem;">{{ topic.detail | safe }}</div>
            <div style="margin-top: 15px; font-size: 0.85rem; color: var(--text-sub); background: var(--bg-page-base); padding: 8px 12px; border-radius: 8px; display: inline-flex; align-items: center; gap: 8px;">
                <span style="color: var(--miku-base); font-size: 1.1rem;">🎵</span> 
                <span>参与主唱:</span> 
                <span style="color: var(--miku-dark); font-weight: bold;">{{ topic.contributors }}</span>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endif %}
