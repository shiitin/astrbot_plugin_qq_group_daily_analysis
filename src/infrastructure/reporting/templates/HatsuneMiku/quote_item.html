{% if quotes %}
<style>
    .quotes-section { grid-column: span 12; display: flex; flex-direction: column; gap: 20px; margin-top: 10px; }
    .quote-wrapper { width: 100%; max-width: 90%; }
    .q-flex-container { display: flex; gap: 15px; align-items: flex-start; }
    .q-avatar { width: 45px; height: 45px; border-radius: 4px; border: 2px solid var(--color-miku); }
    .quote-wrapper:nth-child(even) .q-avatar { border-color: var(--color-pink); }
    .q-sender-name { font-family: var(--font-hand); font-size: 1rem; color: var(--ink-secondary); margin-bottom: 4px; }
    .q-bubble { background: #fff; border: 2px solid var(--color-miku); padding: 15px 20px; border-radius: 2px 15px 15px 15px; position: relative; z-index: 2; box-shadow: 4px 4px 0 var(--color-light-teal); }
    
    .quote-wrapper:nth-child(even) { align-self: flex-end; }
    .quote-wrapper:nth-child(even) .q-flex-container { flex-direction: row-reverse; }
    .quote-wrapper:nth-child(even) .q-sender-name { text-align: right; }
    .quote-wrapper:nth-child(even) .q-bubble { border-color: var(--color-pink); border-radius: 15px 2px 15px 15px; box-shadow: -4px 4px 0 #ffe4e1; text-align: right; }
    
    .q-content { font-family: var(--font-body); font-size: 1.2rem; font-weight: bold; color: var(--color-dark); }
    .q-analysis-note { background: var(--color-dark); color: white; padding: 8px 12px; font-size: 0.9rem; margin-top: -2px; border-radius: 0 0 8px 8px; font-family: var(--font-body); display: inline-block; }
    .note-label { color: var(--color-miku); font-weight: bold; font-family: var(--font-hand); }
</style>
<div class="quotes-section">
    <div class="section-title">💬 名台词 Vocal Quotes</div>
    {% for quote in quotes %}
    <div class="quote-wrapper">
        <div class="q-flex-container">
            <div>
                {% if quote.avatar_url %}
                <img src="{{ quote.avatar_url }}" class="q-avatar">
                {% endif %}
            </div>
            <div style="flex: 1;">
                <div class="q-sender-name">{{ quote.sender }}</div>
                <div class="q-bubble">
                    <div class="q-content">{{ quote.content }}</div>
                </div>
                <div class="q-analysis-note">
                    <span class="note-label">>> Miku_Analysis: </span>{{ quote.reason | safe }}
                </div>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endif %}
